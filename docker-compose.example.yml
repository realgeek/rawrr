version: '3.8'

services:
  # Example: Rawrr watching for updates
  rawrr:
    build: .
    image: rawrr:latest
    container_name: rawrr
    environment:
      # Startup delay before first poll (seconds)
      RAWRR_STARTUP_DELAY_SECS: "30"

      # How often to poll registries (seconds) - 1 hour default
      RAWRR_POLL_INTERVAL_SECS: "3600"

      # Delay between image release and upgrade (hours) - 6 hours default
      RAWRR_RELEASE_DELAY_HOURS: "6"

      # Path to state file
      RAWRR_STATE_FILE: "/var/lib/rawrr/state.json"

      # Docker socket
      DOCKER_HOST: "unix:///var/run/docker.sock"

      # Label names for controlling behavior
      RAWRR_LABEL_IGNORE: "rawrr.ignore"
      RAWRR_LABEL_NOTIFY: "rawrr.notify"
      RAWRR_LABEL_UPDATE: "rawrr.update"

      # Notifier: gotify, ntfy, or empty for disabled
      RAWRR_NOTIFIER: "gotify"
      RAWRR_GOTIFY_URL: "http://gotify:80"
      RAWRR_GOTIFY_TOKEN: "your-token-here"

      # Alternatively, use ntfy:
      # RAWRR_NOTIFIER: "ntfy"
      # RAWRR_NTFY_URL: "https://ntfy.sh"
      # RAWRR_NTFY_TOPIC: "my-docker-updates"

      # Rate limiting
      RAWRR_RATE_LIMIT_MAX_POLLS: "100"
      RAWRR_RATE_LIMIT_WINDOW_SECS: "3600"

      # Logging
      RUST_LOG: "rawrr=debug,info"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - rawrr_state:/var/lib/rawrr

    restart: unless-stopped

  # Example: Service that gets automatically updated
  nginx:
    image: nginx:latest
    container_name: nginx-web
    labels:
      rawrr.policy: "update"
    ports:
      - "80:80"
    restart: unless-stopped

  # Example: Service that only gets notifications (no auto-update)
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    labels:
      rawrr.policy: "notify"
    environment:
      POSTGRES_PASSWORD: "example"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Example: Service to ignore
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    labels:
      rawrr.policy: "ignore"
    restart: unless-stopped

  # Optional: Gotify for notifications
  gotify:
    image: gotify/gotify-server:latest
    container_name: gotify
    environment:
      GOTIFY_DEFAULTUSER_PASS: "admin"
    ports:
      - "8080:80"
    volumes:
      - gotify_data:/var/gotify
    restart: unless-stopped

volumes:
  rawrr_state:
  postgres_data:
  gotify_data:
